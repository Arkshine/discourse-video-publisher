allowed_groups:
  default: "0"
  type: list
  list_type: group

vimeo_upload_enabled:
  default: false

vimeo_oauth_client_id:
  default: ""

vimeo_api_access_token:
  default: ""

vimeo_default_view_privacy:
  default: anybody
  type: enum
  choices:
    - anybody
    - unlisted
    - disable

vimeo_default_embed_privacy:
  default: public
  type: enum
  choices:
    - public
    - private

youtube_upload_enabled:
  default: false

youtube_api_client_id:
  default: ""

youtube_default_view_privacy:
  default: unlisted
  type: enum
  choices:
    - private
    - public
    - unlisted

cloudflare_stream_upload_enabled:
  default: false

mux_upload_enabled:
  default: false

video_broker_origin:
  default: ""

max_upload_size_mb:
  default: 0
  type: integer
  min: 0
  max: 51200

max_duration_minutes:
  default: 0
  type: integer
  min: 0
  max: 600

processing_wait_timeout_minutes:
  default: 10
  type: integer
  min: 0
  max: 600

svg_icons:
  default: "fab-youtube|fab-vimeo-v|fab-cloudflare|video|upload"
  type: "list"
  list_type: "compact"

extend_content_security_policy:
  type: list
  default: "script_src: https://accounts.google.com/gsi/client|connect_src: https://api.vimeo.com|connect_src: https://upload.videodelivery.net|connect_src: https://storage.googleapis.com|frame_src: https://iframe.videodelivery.net|frame_src: https://player.mux.com"
